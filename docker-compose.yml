services:
  # ── MySQL Database ───────────────────────────────────────────────
  db:
    image: mysql:8.0
    container_name: clinivoice_db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-ClinivoiceSecure2024!}
      MYSQL_DATABASE: clinivoice_v2
    volumes:
      - clinivoice_db_data:/var/lib/mysql
    # DO NOT expose port to internet - only internal Docker network
    # ports:
    #   - "3306:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Clinivoice App ───────────────────────────────────────────────
  app:
    build: .
    container_name: clinivoice_app
    restart: unless-stopped
    ports:
      - "3002:3002"
    environment:
      PORT: 3002
      NODE_ENV: production
      DB_HOST: db
      DB_PORT: 3306
      DB_USER: root
      DB_PASSWORD: ${DB_PASSWORD:-ClinivoiceSecure2024!}
      DB_NAME: clinivoice_v2
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      AI_PROVIDER: ${AI_PROVIDER:-auto}
      ENC_KEY: ${ENC_KEY:-}
      JWT_SECRET: ${JWT_SECRET:-}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-}
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - clinivoice_uploads:/app/uploads

volumes:
  clinivoice_db_data:
  clinivoice_uploads:
